<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Session Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Comfortaa:wght@300;400;700&family=Josefin+Sans:wght@100;300;400;600&family=Fraunces:ital,wght@0,100;0,700;1,400&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Special+Elite&family=Nunito:wght@300;400;600;700;800&family=IM+Fell+English:ital@0;1&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   SESSION CLOCK — CSS Custom Properties
   All theming flows through here. Zero inline-style thrash.
═══════════════════════════════════════════════════════════ */
:root {
  --clr-text:    #e0f2fe;
  --clr-accent:  #6ee7b7;
  --clr-accent2: #818cf8;
  --clr-track:   rgba(255,255,255,.1);
  --clr-btn-bg:  rgba(110,231,183,.16);
  --clr-btn-fg:  #6ee7b7;
  --clr-pill:    rgba(255,255,255,.06);
  --clr-panel:   rgba(4,3,18,.7);
  --font-main:   'Orbitron', monospace;
  --glow:        0 0 55px rgba(110,231,183,.35), 0 0 130px rgba(129,140,248,.15);
  --btn-radius:  99px;
  --lb-h:        0px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: 'Nunito', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
}

/* ── Canvas layers ── */
#bgCanvas  { position:fixed; inset:0; z-index:0; width:100%; height:100%; will-change:contents; }
#transCanvas { position:fixed; inset:0; z-index:300; pointer-events:none; width:100%; height:100%; display:none; }
#overlay, #vignette { position:fixed; inset:0; pointer-events:none; transition:background .6s; }
#overlay  { z-index:1; }
#vignette { z-index:3; }
#scanlines {
  position:fixed; inset:0; z-index:4; pointer-events:none; opacity:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
  transition: opacity .8s;
}
#grain { position:fixed; inset:0; z-index:5; pointer-events:none; opacity:0; transition:opacity .8s; }
#letterboxTop, #letterboxBot {
  position:fixed; left:0; right:0; z-index:7; background:#000;
  height: var(--lb-h); pointer-events:none;
  transition: height .9s cubic-bezier(.4,0,.2,1);
}
#letterboxTop { top:0; }
#letterboxBot { bottom:0; }
#hdrBloom {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  opacity:0; mix-blend-mode:screen; transition:opacity 1s, background .8s;
}

/* ── Show badge ── */
#showBadge {
  position:fixed; top:20px; left:50%;
  transform: translateX(-50%) translateY(-90px);
  z-index:50; font-size:.6rem; letter-spacing:.28em; text-transform:uppercase;
  font-weight:700; padding:5px 18px; border-radius:2px; opacity:0;
  transition: transform .7s cubic-bezier(.34,1.56,.64,1), opacity .7s;
  white-space:nowrap; pointer-events:none;
  color: var(--clr-text); font-family: var(--font-main);
}
#showBadge.visible { transform:translateX(-50%) translateY(0); opacity:1; }

/* ── UTC pill ── */
.utc-pill {
  position:fixed; top:16px; right:16px; z-index:100;
  font-size:.64rem; letter-spacing:.13em; text-transform:uppercase; font-weight:700;
  padding:5px 12px; border-radius:99px; backdrop-filter:blur(14px); opacity:.48;
  background: var(--clr-pill); color: var(--clr-text);
  font-variant-numeric: tabular-nums;
  transition: background .4s, color .4s;
}

/* ── Main UI ── */
.main {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap: clamp(8px, 1.8vh, 20px); width:100%; padding:20px; text-align:center;
}
.greeting {
  font-size: clamp(.72rem, 1.4vw, .9rem); letter-spacing:.28em; text-transform:uppercase;
  opacity:.65; font-weight:600; color: var(--clr-text);
}
.clock-wrap { display:inline-flex; align-items:baseline; }
.time-display {
  font-size: clamp(4.5rem, 15vw, 12rem); font-weight:900; line-height:1;
  letter-spacing:-.02em; font-variant-numeric:tabular-nums; user-select:none;
  color: var(--clr-text); text-shadow: var(--glow); font-family: var(--font-main);
}
.ampm {
  font-size: clamp(.9rem, 2.6vw, 2rem); font-weight:700; align-self:flex-end;
  margin-left:10px; padding-bottom:.22em; opacity:.5; letter-spacing:.1em;
  color: var(--clr-text);
}
.seconds-ms {
  font-size: clamp(.8rem, 1.6vw, 1.3rem); letter-spacing:.08em; opacity:.4;
  font-weight:300; margin-top:-4px; color: var(--clr-text); font-family: var(--font-main);
}
.date-display {
  font-size: clamp(.72rem, 1.5vw, 1rem); letter-spacing:.22em; text-transform:uppercase;
  font-weight:600; opacity:.55; color: var(--clr-text);
}
.progress-wrap { width: min(360px, 74vw); display:flex; flex-direction:column; gap:5px; }
.progress-labels {
  display:flex; justify-content:space-between; font-size:.6rem; letter-spacing:.14em;
  text-transform:uppercase; opacity:.42; font-weight:700; color: var(--clr-text);
}
.progress-track { height:3px; border-radius:99px; overflow:hidden; background: var(--clr-track); }
.progress-fill {
  height:100%; border-radius:99px;
  background: linear-gradient(90deg, var(--clr-accent), var(--clr-accent2));
  width:0%; transition:width .08s linear;
}
.session-area { display:flex; flex-direction:column; align-items:center; gap:7px; }
.session-label { font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; font-weight:700; opacity:.4; color: var(--clr-text); }
.session-timer {
  font-size: clamp(1.1rem, 3vw, 2.2rem); font-weight:800; letter-spacing:.08em;
  font-variant-numeric:tabular-nums; color: var(--clr-text); font-family: var(--font-main);
}
.session-controls { display:flex; gap:9px; }
.btn {
  border:none; cursor:pointer; font-family:inherit; font-weight:700; font-size:.68rem;
  letter-spacing:.14em; text-transform:uppercase; padding:7px 15px;
  border-radius: var(--btn-radius); outline:none;
  background: var(--clr-btn-bg); color: var(--clr-btn-fg);
  transition: transform .12s, opacity .2s;
}
.btn:hover { transform:scale(1.07); }
.btn:active { transform:scale(.95); }
.sync-pill {
  display:flex; align-items:center; gap:6px; font-size:.58rem; letter-spacing:.14em;
  text-transform:uppercase; font-weight:700; padding:4px 11px; border-radius:99px;
  opacity:.42; background: var(--clr-pill); color: var(--clr-text);
}
.sync-dot { width:5px; height:5px; border-radius:50%; background:#888; transition:background .5s; }
.quote-area { max-width: min(460px, 78vw); text-align:center; }
.quote-text {
  font-size: clamp(.68rem, 1.3vw, .86rem); line-height:1.8; opacity:.38;
  font-style:italic; color: var(--clr-text); transition:opacity .5s;
}
.colon { animation: blinkColon 1s step-end infinite; display:inline-block; }
@keyframes blinkColon { 0%,100%{opacity:1} 50%{opacity:.1} }

/* Staggered fade-in */
.main > * { animation: fadeUp .85s ease both; }
.main > *:nth-child(1){animation-delay:.04s} .main > *:nth-child(2){animation-delay:.1s}
.main > *:nth-child(3){animation-delay:.16s} .main > *:nth-child(4){animation-delay:.22s}
.main > *:nth-child(5){animation-delay:.28s} .main > *:nth-child(6){animation-delay:.34s}
.main > *:nth-child(7){animation-delay:.4s}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ── Theme panel ── */
#themePanel {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  padding:12px 16px 14px;
  background: var(--clr-panel);
  box-shadow: 0 -1px 0 rgba(255,255,255,.06);
  display:flex; flex-direction:column; gap:8px;
}
.theme-row { display:flex; align-items:center; gap:8px; overflow-x:auto; scrollbar-width:none; }
.theme-row::-webkit-scrollbar { display:none; }
.row-label {
  font-size:.48rem; letter-spacing:.24em; text-transform:uppercase; font-weight:800;
  opacity:.32; white-space:nowrap; min-width:42px; color: var(--clr-text);
}
.nat-btn {
  width:22px; height:22px; border-radius:50%; border:2px solid transparent;
  cursor:pointer; outline:none; flex-shrink:0;
  transition: transform .2s, border-color .25s, box-shadow .25s;
}
.nat-btn:hover { transform:scale(1.25); }
.nat-btn.active { border-color:rgba(255,255,255,.9); box-shadow:0 0 0 2px rgba(255,255,255,.2); transform:scale(1.18); }
.media-card {
  display:flex; align-items:center; gap:7px; padding:5px 11px 5px 8px; border-radius:6px;
  border:1px solid rgba(255,255,255,.08); cursor:pointer; outline:none; flex-shrink:0;
  background:rgba(255,255,255,.04);
  transition: background .2s, border-color .2s, transform .15s, box-shadow .2s;
}
.media-card:hover { background:rgba(255,255,255,.1); transform:translateY(-2px); }
.media-card.active { border-color:rgba(255,255,255,.5); box-shadow:0 0 12px rgba(255,255,255,.12); }
.media-logo { width:32px; height:22px; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.media-logo svg { width:100%; height:100%; }
.media-name { font-size:.62rem; font-weight:700; letter-spacing:.04em; white-space:nowrap; line-height:1.2; text-align:left; color:rgba(255,255,255,.82); }
.media-sub  { font-size:.48rem; font-weight:400; letter-spacing:.08em; opacity:.5; white-space:nowrap; line-height:1.2; text-transform:uppercase; }
.row-divider { height:1px; background:rgba(255,255,255,.06); margin:0 -16px; }

@media(max-width:600px) {
  #themePanel { padding:9px 10px 11px; gap:6px; }
  .media-name { font-size:.56rem; }
  .media-logo { width:26px; height:18px; }
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="overlay"></div>
<div id="vignette"></div>
<div id="hdrBloom"></div>
<div id="scanlines"></div>
<div id="grain"></div>
<div id="letterboxTop"></div>
<div id="letterboxBot"></div>
<canvas id="transCanvas"></canvas>

<div id="showBadge"></div>
<div class="utc-pill" id="utcPill">UTC --:--:--</div>

<div class="main">
  <div class="greeting" id="greeting">Good morning</div>
  <div>
    <div class="clock-wrap">
      <div class="time-display" id="timeDis">--<span class="colon">:</span>--<span class="colon">:</span>--</div>
      <div class="ampm" id="ampmDis">--</div>
    </div>
    <div class="seconds-ms" id="secMs">.---</div>
  </div>
  <div class="date-display" id="dateDis">—</div>
  <div class="progress-wrap">
    <div class="progress-labels"><span>Day Progress</span><span id="dayPct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="session-area">
    <div class="session-label">Session Timer</div>
    <div class="session-timer" id="sessionTimer">00:00:00</div>
    <div class="session-controls">
      <button class="btn" id="btnStart">Start</button>
      <button class="btn" id="btnReset">Reset</button>
    </div>
  </div>
  <div class="sync-pill">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Syncing…</span>
  </div>
  <div class="quote-area"><div class="quote-text" id="quoteText"></div></div>
</div>

<div id="themePanel"></div>

<script>
'use strict';

// TYPES (JSDoc — TypeScript-compatible without a build step)
// ═══════════════════════════════════════════════════════════════════════

// THEME DATA — pure data, no DOM refs, no trailing commas
// ═══════════════════════════════════════════════════════════════════════

const THEMES = [

// ═══════════════════════════════════════════════════════════════════════
// MATH HELPERS — zero allocation, inlined
// ═══════════════════════════════════════════════════════════════════════
/** @param {number} n @returns {number} */
const rnd   = n => Math.random() * n;
/** @param {number} n @returns {number} */
const rndpm = n => (Math.random() - .5) * n * 2;
/** @param {number} n @returns {string} */
const p2    = n => (n < 10 ? '0' : '') + n;
/** @param {number} n @returns {string} */
const p3    = n => (n < 10 ? '00' : n < 100 ? '0' : '') + n;
/** @param {number} t @returns {number} */
const easeIO = t => t < .5 ? 2*t*t : 1 - ((-2*t+2)**2)/2;

// ═══════════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════════
const bgCanvas  = /** @type {HTMLCanvasElement} */ (document.getElementById('bgCanvas'));
const bgCtx     = /** @type {CanvasRenderingContext2D} */ (bgCanvas.getContext('2d', { alpha: false }));
const tCanvas   = /** @type {HTMLCanvasElement} */ (document.getElementById('transCanvas'));
const tCtx      = /** @type {CanvasRenderingContext2D} */ (tCanvas.getContext('2d'));

let W = 0, H = 0;

function resize() {
  W = bgCanvas.width = tCanvas.width = window.innerWidth;
  H = bgCanvas.height = tCanvas.height = window.innerHeight;
  skylineReady = false;
  buildParticles();
}
window.addEventListener('resize', resize, { passive: true });

// ═══════════════════════════════════════════════════════════════════════
// PARTICLE SYSTEM — typed Float32Array pools
// Stride layout: [x, y, vx, vy, r, a, life, aux1, aux2]
// ═══════════════════════════════════════════════════════════════════════
const PSTRIDE = 9;
let pool  = new Float32Array(0);
let poolN = 0;

// Matrix rain — column-based
let matCols = /** @type {Float32Array|null} */ (null);
const MAT_CHARS = '日ｦｲｸｺｻｼｽｾｿﾀﾂﾃﾄﾅﾆﾇﾈﾊﾋﾌﾎﾏﾐﾑﾒﾓﾔﾕﾗﾘﾙﾚﾛﾜ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

// Skyline — rebuilt on resize
let skylineReady = false;
let skylineCount = 0;
const MAX_SKY = 120;
const skyX  = new Float32Array(MAX_SKY);
const skyW  = new Float32Array(MAX_SKY);
const skyHt = new Float32Array(MAX_SKY);

function buildParticles() {
  const t = currentTheme;
  poolN = 0;
  matCols = null;

  /** @param {number} n */
  const make = (n) => { pool = new Float32Array(n * PSTRIDE); poolN = n; };
  /** @param {number} i @returns {number} */
  const p = (i) => i * PSTRIDE;

  switch (t.bgType) {
    case 'aurora': {
      make(80);
      const cols = t.bgColors || ['#6ee7b7'];
      for (let i = 0; i < 80; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H);
        pool[o+2]=rndpm(.28); pool[o+3]=rndpm(.28);
        pool[o+4]=rnd(2)+.5; pool[o+5]=rnd(.55)+.2;
        pool[o+7]=i % cols.length;
      }
      break;
    }
    case 'midnight': case 'strangerthings': case 'interstellar': {
      const n = t.bgType === 'interstellar' ? 280 : 200;
      make(n);
      for (let i = 0; i < n; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H);
        pool[o+4]=rnd(t.bgType === 'interstellar' ? 1.2 : 1.5)+.2;
        pool[o+5]=rnd(.8)+.15;
        pool[o+7]=rnd(Math.PI*2); pool[o+8]=rnd(.018)+.004;
      }
      break;
    }
    case 'candy': {
      make(22);
      for (let i = 0; i < 22; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=H+60;
        pool[o+2]=rndpm(.3); pool[o+3]=-(rnd(.3)+.1);
        pool[o+4]=rnd(36)+10; pool[o+5]=rnd(.1)+.03;
        pool[o+7]=rnd(Math.PI*2);
      }
      break;
    }
    case 'ocean': case 'dark': {
      make(5);
      for (let i = 0; i < 5; i++) {
        const o = p(i);
        pool[o+1]=H*(.26+i*.13);
        pool[o+7]=16+i*13; pool[o+8]=.004+i*.002;
        pool[o+2]=.0025+i*.001; pool[o+3]=i*.7;
        pool[o+5]=t.bgType === 'dark' ? .032 : .065;
      }
      break;
    }
    case 'supernatural': {
      make(50);
      for (let i = 0; i < 50; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H);
        pool[o+2]=rndpm(.25); pool[o+3]=-(rnd(.45)+.12);
        pool[o+4]=rnd(2)+.5; pool[o+5]=rnd(.8)+.2;
        pool[o+6]=rnd(1); pool[o+7]=rnd(.0025)+.0008;
      }
      break;
    }
    case 'mentalist': {
      make(12);
      for (let i = 0; i < 12; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H);
        pool[o+2]=rndpm(.18); pool[o+3]=rndpm(.18);
        pool[o+4]=rnd(3)+1; pool[o+5]=rnd(.3)+.07;
        pool[o+7]=rnd(Math.PI*2); pool[o+8]=rndpm(.008);
      }
      break;
    }
    case 'sopranos': {
      make(14);
      for (let i = 0; i < 14; i++) {
        const o = p(i);
        pool[o]=rnd(W*.5)+W*.25; pool[o+1]=H;
        pool[o+2]=rndpm(.1); pool[o+3]=-(rnd(.35)+.08);
        pool[o+4]=rnd(16)+5; pool[o+5]=rnd(.06)+.02;
        pool[o+7]=rnd(.1)+.04;
      }
      break;
    }
    case 'breakingbad': {
      make(22);
      for (let i = 0; i < 22; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H);
        pool[o+2]=rndpm(.22); pool[o+3]=rndpm(.22);
        pool[o+4]=rnd(22)+7; pool[o+5]=rnd(.15)+.04;
        pool[o+7]=rnd(Math.PI*2); pool[o+8]=rndpm(.007);
      }
      break;
    }
    case 'dune': {
      make(60);
      for (let i = 0; i < 60; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H);
        pool[o+2]=rndpm(.12); pool[o+3]=rnd(.16)+.04;
        pool[o+4]=rnd(1.5)+.3; pool[o+5]=rnd(.5)+.15;
        pool[o+6]=rnd(1);
      }
      break;
    }
    case 'bladerunner': {
      make(90);
      for (let i = 0; i < 90; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H*.6);
        pool[o+2]=rndpm(.4)-.1; pool[o+3]=rnd(.9)+.3;
        pool[o+4]=rnd(.8)+.2; pool[o+5]=rnd(.45)+.1;
      }
      buildSkyline();
      break;
    }
    case 'inception': {
      make(4);
      for (let i = 0; i < 4; i++) {
        const o = p(i);
        pool[o]=W/2; pool[o+1]=H/2;
        pool[o+4]=80+i*90; pool[o+5]=.045-i*.008;
        pool[o+7]=i*.8; pool[o+8]=.004-i*.0007;
      }
      break;
    }
    case 'godfather': {
      make(8);
      for (let i = 0; i < 8; i++) {
        const o = p(i);
        pool[o]=rnd(W*.5)+W*.25; pool[o+1]=rnd(H*.5)+H*.2;
        pool[o+2]=rndpm(.07); pool[o+3]=-(rnd(.1)+.04);
        pool[o+4]=rnd(20)+8; pool[o+5]=rnd(.05)+.02;
        pool[o+7]=rnd(.04)+.01;
      }
      break;
    }
    case 'redbull': case 'ferrari': case 'mercedes': case 'mclaren': case 'astonmartin': {
      make(60);
      for (let i = 0; i < 60; i++) {
        const o = p(i);
        pool[o]=rnd(W); pool[o+1]=rnd(H);
        pool[o+2]=rnd(3)+1.5; pool[o+3]=rndpm(.15);
        pool[o+4]=rnd(.8)+.3; pool[o+5]=rnd(.55)+.15;
        pool[o+7]=Math.random();
      }
      break;
    }
    case 'matrix': {
      buildMatrixRain();
      break;
    }
    // nat themes with no particles — base gradient only
    default: break;
  }
}

function buildMatrixRain() {
  const cols = Math.floor(W / 15);
  matCols = new Float32Array(cols * 2);
  for (let i = 0; i < cols; i++) {
    matCols[i*2]   = rnd(H);
    matCols[i*2+1] = rnd(3)+1.5;
  }
}

function buildSkyline() {
  skylineCount = 0;
  let x = 0;
  while (x < W && skylineCount < MAX_SKY) {
    const si  = skylineCount++;
    const sw  = rnd(45)+12;
    skyX[si]  = x;
    skyW[si]  = sw;
    skyHt[si] = rnd(H*.38)+H*.07;
    x += sw + rnd(4)+1;
  }
  skylineReady = true;
}

// ═══════════════════════════════════════════════════════════════════════
// BACKGROUND RENDERER
// ═══════════════════════════════════════════════════════════════════════
let tick   = 0;
let lastTs = 0;

/** @param {number} dt delta seconds */
function drawBg(dt) {
  const c = bgCtx, t = currentTheme;
  tick += dt;
  c.clearRect(0, 0, W, H);

  // Base radial gradient from theme's baseBg
  const bg = t.baseBg;
  const gr = c.createRadialGradient(W*.5, H*.4, 0, W*.5, H*.55, Math.max(W,H)*.9);
  gr.addColorStop(0, bg[0]);
  gr.addColorStop(.5, bg[1] || bg[0]);
  gr.addColorStop(1,  bg[2] || bg[0]);
  c.fillStyle = gr;
  c.fillRect(0, 0, W, H);

  const bt = t.bgType;

  if (bt === 'aurora') {
    const cols = t.bgColors || ['#6ee7b7'];
    for (let i = 0; i < poolN; i++) {
      const o = i*PSTRIDE;
      pool[o]   += pool[o+2]; pool[o+1] += pool[o+3];
      if (pool[o]  <-60) pool[o] = W+60;
      if (pool[o]  >W+60) pool[o] = -60;
      if (pool[o+1]<-60) pool[o+1] = H+60;
      if (pool[o+1]>H+60) pool[o+1] = -60;
      const px=pool[o], py=pool[o+1], pr=pool[o+4], pa=pool[o+5];
      const col = cols[pool[o+7]|0];
      const g = c.createRadialGradient(px,py,0, px,py, pr*50);
      g.addColorStop(0, col+'88'); g.addColorStop(1, col+'00');
      c.beginPath(); c.arc(px,py,pr*50,0,Math.PI*2);
      c.fillStyle=g; c.globalAlpha=pa*.3; c.fill();
      c.beginPath(); c.arc(px,py,pr,0,Math.PI*2);
      c.fillStyle=col; c.globalAlpha=pa; c.fill();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'sunrise') {
    const s=tick*.08, s2=tick*.14;
    const sg=c.createLinearGradient(0,0,W*Math.abs(Math.sin(s)),H);
    sg.addColorStop(0,'#1a0900');
    sg.addColorStop(.35+.08*Math.sin(s2),'#8b1a00');
    sg.addColorStop(.72,'#3d0060');
    sg.addColorStop(1,'#0a0020');
    c.fillStyle=sg; c.fillRect(0,0,W,H);
    const sg2=c.createRadialGradient(W*.5,H*.66,0,W*.5,H*.66,W*.52);
    sg2.addColorStop(0,'rgba(255,130,28,.28)');
    sg2.addColorStop(.5,'rgba(255,55,75,.09)');
    sg2.addColorStop(1,'transparent');
    c.fillStyle=sg2; c.fillRect(0,0,W,H);
  }

  else if (bt === 'forest') {
    for (let i=0;i<3;i++) {
      const bx=W*(.2+i*.3)+Math.sin(tick*.28+i)*25;
      const by=H*(.3+i*.2)+Math.cos(tick*.2+i)*18;
      const rg=c.createRadialGradient(bx,by,0,bx,by,180+i*70);
      rg.addColorStop(0,t.accent+'15'); rg.addColorStop(1,'transparent');
      c.fillStyle=rg; c.fillRect(0,0,W,H);
    }
  }

  else if (bt === 'ocean' || bt === 'dark') {
    if (bt === 'dark') {
      const dg=c.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.52);
      dg.addColorStop(0,'rgba(0,38,95,.055)'); dg.addColorStop(1,'transparent');
      c.fillStyle=dg; c.fillRect(0,0,W,H);
      c.save(); c.translate(W*.5,H*.5);
      for (let i=0;i<3;i++) {
        const r=(72+i*66)+Math.sin(tick*.35+i)*6;
        c.beginPath(); c.arc(0,0,r,0,Math.PI*2);
        c.strokeStyle=t.accent; c.globalAlpha=.032-i*.007; c.lineWidth=.8; c.stroke();
      }
      c.globalAlpha=1; c.restore();
      drawSymbol(c, bt);
    }
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o+3]+=pool[o+2];
      c.beginPath(); c.moveTo(0,pool[o+1]);
      for (let x=0;x<=W;x+=8)
        c.lineTo(x, pool[o+1]+Math.sin(x*pool[o+8]+pool[o+3])*pool[o+7]);
      c.lineTo(W,H); c.lineTo(0,H); c.closePath();
      c.fillStyle=t.accent; c.globalAlpha=pool[o+5]; c.fill();
    }
    c.globalAlpha=1;
  }

  else if (bt==='midnight'||bt==='strangerthings'||bt==='interstellar') {
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o+7]+=pool[o+8];
      const a=pool[o+5]*(0.45+0.55*Math.sin(pool[o+7]));
      c.beginPath(); c.arc(pool[o],pool[o+1],pool[o+4],0,Math.PI*2);
      c.fillStyle='#ffffff'; c.globalAlpha=a; c.fill();
    }
    c.globalAlpha=1;
    if (bt==='strangerthings') {
      const pg=c.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.4);
      pg.addColorStop(0,t.accent+'12'); pg.addColorStop(.5,t.accent2+'07'); pg.addColorStop(1,'transparent');
      c.fillStyle=pg; c.globalAlpha=.5+.5*Math.sin(tick*.7); c.fillRect(0,0,W,H); c.globalAlpha=1;
      drawSymbol(c, bt);
    }
    if (bt==='interstellar') {
      const bh=c.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.28);
      bh.addColorStop(0,'rgba(0,0,0,.9)'); bh.addColorStop(.35,'rgba(0,30,80,.3)');
      bh.addColorStop(.65,'rgba(0,60,140,.1)'); bh.addColorStop(1,'transparent');
      c.fillStyle=bh; c.fillRect(0,0,W,H);
      c.save(); c.translate(W*.5,H*.5);
      c.beginPath(); c.ellipse(0,0,W*.22,W*.055,0,0,Math.PI*2);
      c.strokeStyle='rgba(80,160,255,.12)'; c.lineWidth=16; c.stroke();
      c.restore();
      drawSymbol(c, bt);
    }
  }

  else if (bt === 'candy') {
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o]  +=pool[o+2]+Math.sin(tick+pool[o+7])*.2;
      pool[o+1]+=pool[o+3];
      if (pool[o+1]<-120) { pool[o+1]=H+50; pool[o]=rnd(W); }
      c.beginPath(); c.arc(pool[o],pool[o+1],pool[o+4],0,Math.PI*2);
      c.strokeStyle=t.accent; c.globalAlpha=pool[o+5]*3; c.lineWidth=1.5; c.stroke();
      c.fillStyle=t.baseBg[0]; c.globalAlpha=pool[o+5]; c.fill();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'nordic') {
    c.globalAlpha=.022;
    for (let x=0;x<W;x+=40) for (let y=0;y<H;y+=40) { c.fillStyle='#64748b'; c.fillRect(x,y,1,1); }
    c.globalAlpha=1;
  }

  else if (bt === 'lemon') {
    c.globalAlpha=.18;
    for (let x=0;x<W;x+=28) for (let y=0;y<H;y+=28) {
      c.beginPath(); c.arc(x,y,1.3,0,Math.PI*2); c.fillStyle=t.accent; c.fill();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'supernatural') {
    const fg=c.createRadialGradient(W*.5,H*1.05,0,W*.5,H*.78,W*.62);
    fg.addColorStop(0,'rgba(220,75,0,.26)'); fg.addColorStop(1,'transparent');
    c.fillStyle=fg; c.fillRect(0,0,W,H);
    drawSymbol(c, bt);
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o+1]+=pool[o+3]; pool[o]+=pool[o+2]+Math.sin(tick*1.8+pool[o+5])*.35;
      pool[o+6]-=pool[o+7];
      if (pool[o+6]<=0||pool[o+1]<0) { pool[o]=rnd(W);pool[o+1]=H+6;pool[o+6]=1;pool[o+5]=rnd(.8)+.2; }
      const ec=c.createRadialGradient(pool[o],pool[o+1],0,pool[o],pool[o+1],pool[o+4]*4);
      ec.addColorStop(0,'rgba(255,175,25,.9)'); ec.addColorStop(1,'rgba(200,45,0,0)');
      c.beginPath(); c.arc(pool[o],pool[o+1],pool[o+4]*4,0,Math.PI*2);
      c.fillStyle=ec; c.globalAlpha=pool[o+6]*pool[o+5]*.45; c.fill();
      c.beginPath(); c.arc(pool[o],pool[o+1],pool[o+4]*.5,0,Math.PI*2);
      c.fillStyle='#fffae0'; c.globalAlpha=pool[o+6]; c.fill();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'mentalist') {
    const rg=c.createRadialGradient(W*.5,H*.3,0,W*.5,H*.3,W*.5);
    rg.addColorStop(0,'rgba(180,8,0,.12)'); rg.addColorStop(1,'transparent');
    c.fillStyle=rg; c.fillRect(0,0,W,H);
    drawSymbol(c, bt);
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]; pool[o+1]+=pool[o+3]; pool[o+7]+=pool[o+8];
      if(pool[o]<-50)pool[o]=W+50; if(pool[o]>W+50)pool[o]=-50;
      if(pool[o+1]<-50)pool[o+1]=H+50; if(pool[o+1]>H+50)pool[o+1]=-50;
      c.save(); c.translate(pool[o],pool[o+1]); c.rotate(pool[o+7]);
      c.beginPath(); c.arc(0,0,pool[o+4]*6,0,Math.PI*2);
      c.strokeStyle=t.accent; c.globalAlpha=pool[o+5]; c.lineWidth=1; c.stroke();
      c.globalAlpha=1; c.restore();
    }
  }

  else if (bt === 'sopranos') {
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]+Math.sin(tick*.4+pool[o+5])*.15;
      pool[o+1]+=pool[o+3]; pool[o+4]+=pool[o+7];
      if (pool[o+1]<-120||pool[o+4]>105) {
        pool[o+1]=H+15; pool[o+4]=rnd(15)+5;
        pool[o]=rnd(W*.5)+W*.25; pool[o+3]=-(rnd(.32)+.07);
      }
      c.beginPath(); c.arc(pool[o],pool[o+1],pool[o+4],0,Math.PI*2);
      c.fillStyle='rgba(175,152,92,1)'; c.globalAlpha=pool[o+5]*(1-pool[o+4]/105); c.fill();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'breakingbad') {
    const cg=c.createRadialGradient(W*.5,H*.28,0,W*.5,H*.5,W*.62);
    cg.addColorStop(0,'rgba(95,190,0,.09)'); cg.addColorStop(1,'transparent');
    c.fillStyle=cg; c.fillRect(0,0,W,H);
    c.fillStyle='#0b1400'; c.fillRect(0,H*.72,W,H*.28);
    drawSymbol(c, bt);
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]; pool[o+1]+=pool[o+3]; pool[o+7]+=pool[o+8];
      if(pool[o]<-50)pool[o]=W+50; if(pool[o]>W+50)pool[o]=-50;
      if(pool[o+1]<-50)pool[o+1]=H+50; if(pool[o+1]>H+50)pool[o+1]=-50;
      drawHex(c,pool[o],pool[o+1],pool[o+4],pool[o+7],pool[o+5],t.accent);
    }
  }

  else if (bt === 'matrix') {
    if (!matCols) buildMatrixRain();
    c.fillStyle='rgba(0,8,0,.18)'; c.fillRect(0,0,W,H);
    c.font='13px monospace';
    const cols = matCols.length/2;
    for (let i=0;i<cols;i++) {
      matCols[i*2]+=matCols[i*2+1]*dt*60;
      if (matCols[i*2]>H+20) matCols[i*2]=-20;
      const x=i*15;
      for (let j=0;j<22;j++) {
        const y=matCols[i*2]-j*15;
        if (y<-15||y>H+15) continue;
        const fa=j===0?0.95:Math.max(0,0.6-j*.026);
        c.fillStyle=j===0?`rgba(180,255,180,${fa})`:`rgba(0,${175-j*5},0,${fa})`;
        c.fillText(MAT_CHARS[(j+Math.floor(tick*3*60))%MAT_CHARS.length], x, y);
      }
    }
    drawSymbol(c, bt);
  }

  else if (bt === 'dune') {
    const dg=c.createLinearGradient(0,0,0,H);
    dg.addColorStop(0,'#0e0800'); dg.addColorStop(.5,'#1e1200');
    dg.addColorStop(.75,'#2a1800'); dg.addColorStop(1,'#0e0800');
    c.fillStyle=dg; c.fillRect(0,0,W,H);
    for (let i=0;i<4;i++) {
      const base=H*(.5+i*.1)+Math.sin(tick*.08+i)*10;
      c.beginPath(); c.moveTo(0,base);
      for (let x=0;x<=W;x+=6) c.lineTo(x,base+Math.sin(x*.008+tick*.05+i)*28+Math.sin(x*.02-i)*12);
      c.lineTo(W,H); c.lineTo(0,H); c.closePath();
      const sg=c.createLinearGradient(0,base,0,base+55);
      sg.addColorStop(0,`rgba(180,120,20,${.11-i*.022})`); sg.addColorStop(1,'transparent');
      c.fillStyle=sg; c.fill();
    }
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]; pool[o+1]+=pool[o+3]; pool[o+6]-=.001;
      if (pool[o+6]<=0||pool[o+1]>H+10) { pool[o]=rnd(W);pool[o+1]=rnd(H*.5);pool[o+6]=rnd(.8)+.4; }
      c.beginPath(); c.arc(pool[o],pool[o+1],pool[o+4],0,Math.PI*2);
      c.fillStyle='rgba(220,170,80,1)'; c.globalAlpha=pool[o+5]*pool[o+6]*.55; c.fill();
    }
    c.globalAlpha=1;
    drawSymbol(c, bt);
  }

  else if (bt === 'bladerunner') {
    if (!skylineReady) buildSkyline();
    const skyG=c.createLinearGradient(0,0,0,H*.75);
    skyG.addColorStop(0,'#060300'); skyG.addColorStop(.6,'#120600'); skyG.addColorStop(1,'#0a0400');
    c.fillStyle=skyG; c.fillRect(0,0,W,H*.75);
    [[W*.3,H*.35,'rgba(240,80,20,'],[W*.65,H*.28,'rgba(200,40,10,']].forEach(([nx,ny,col])=>{
      const ng=c.createRadialGradient(nx,ny,0,nx,ny,W*.38);
      ng.addColorStop(0,`${col}.12)`); ng.addColorStop(1,'transparent');
      c.fillStyle=ng; c.fillRect(0,0,W,H);
    });
    c.fillStyle='#040200'; c.fillRect(0,H*.72,W,H*.28);
    c.fillStyle='#040200';
    for (let si=0;si<skylineCount;si++) c.fillRect(skyX[si],H*.72-skyHt[si],skyW[si],skyHt[si]);
    for (let si=0;si<skylineCount;si++) {
      for (let wy=H*.72-skyHt[si]+4;wy<H*.72-3;wy+=8) {
        for (let wx=skyX[si]+3;wx<skyX[si]+skyW[si]-3;wx+=6) {
          const hash=(si*997+Math.floor(wy)*31+Math.floor(wx)*7)%100;
          if (hash<30) {
            const lit=((hash+Math.floor(tick*.1*60))%10)>3;
            if (lit) { c.fillStyle=hash<15?'rgba(220,170,80,.5)':'rgba(255,140,60,.4)'; c.fillRect(wx,wy,2,3); }
          }
        }
      }
    }
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]; pool[o+1]+=pool[o+3];
      if (pool[o+1]>H) { pool[o+1]=rnd(H*.3); pool[o]=rnd(W); }
      c.beginPath(); c.moveTo(pool[o],pool[o+1]); c.lineTo(pool[o]+pool[o+2]*3.5,pool[o+1]+11);
      c.strokeStyle='rgba(180,200,255,1)'; c.globalAlpha=pool[o+5]*.38; c.lineWidth=.5; c.stroke();
    }
    c.globalAlpha=1;
    drawSymbol(c, bt);
  }

  else if (bt === 'inception') {
    c.save(); c.translate(W*.5,H*.5); c.rotate(Math.sin(tick*.06)*.035);
    c.globalAlpha=.022;
    for (let x=-W;x<W;x+=60) { c.beginPath();c.moveTo(x,-H);c.lineTo(x,H);c.strokeStyle='#9090dd';c.lineWidth=.5;c.stroke(); }
    for (let y=-H;y<H;y+=60) { c.beginPath();c.moveTo(-W,y);c.lineTo(W,y);c.strokeStyle='#9090dd';c.lineWidth=.5;c.stroke(); }
    c.globalAlpha=1; c.restore();
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o+7]+=pool[o+8];
      const r=pool[o+4]+Math.sin(pool[o+7])*10;
      c.beginPath(); c.arc(pool[o],pool[o+1],r,0,Math.PI*2);
      c.strokeStyle=t.accent; c.globalAlpha=pool[o+5]*(0.6+0.4*Math.sin(pool[o+7]*2)); c.lineWidth=.8; c.stroke();
    }
    c.globalAlpha=1;
    drawSymbol(c, bt);
  }

  else if (bt === 'godfather') {
    const gg=c.createRadialGradient(W*.3,H*.3,0,W*.3,H*.3,W*.5);
    gg.addColorStop(0,'rgba(70,52,8,.08)'); gg.addColorStop(1,'transparent');
    c.fillStyle=gg; c.fillRect(0,0,W,H);
    for (let i=0;i<poolN;i++) {
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]; pool[o+1]+=pool[o+3]; pool[o+4]+=pool[o+7];
      if (pool[o+1]<-80||pool[o+4]>85) {
        pool[o+1]=H*(.2+rnd(.6)); pool[o+4]=rnd(20)+7; pool[o]=rnd(W*.4)+W*.3;
      }
      c.beginPath(); c.arc(pool[o],pool[o+1],pool[o+4],0,Math.PI*2);
      c.fillStyle='rgba(130,105,18,1)'; c.globalAlpha=pool[o+5]*(1-pool[o+4]/85); c.fill();
    }
    c.globalAlpha=1;
    drawSymbol(c, bt);
  }

  // F1 themes
  else if (bt === 'redbull') {
    c.save(); c.globalAlpha=.045;
    for(let x=0;x<W;x+=18){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.strokeStyle='#1e41ff';c.lineWidth=.5;c.stroke();}
    for(let y=0;y<H;y+=18){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.strokeStyle='#1e41ff';c.lineWidth=.5;c.stroke();}
    c.globalAlpha=1; c.restore();
    const rg=c.createRadialGradient(W*.5,H,0,W*.5,H,W*.65);
    rg.addColorStop(0,'rgba(232,0,45,.22)'); rg.addColorStop(.5,'rgba(30,65,255,.08)'); rg.addColorStop(1,'transparent');
    c.fillStyle=rg; c.fillRect(0,0,W,H);
    drawF1Symbol(c,W,H,tick,'redbull');
    for(let i=0;i<poolN;i++){
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]*2.5; pool[o+1]+=pool[o+3]*.5;
      if(pool[o]>W+20){pool[o]=-20;pool[o+1]=rnd(H);}
      c.beginPath();c.moveTo(pool[o],pool[o+1]);c.lineTo(pool[o]-pool[o+4]*28,pool[o+1]);
      const sg=c.createLinearGradient(pool[o]-pool[o+4]*28,0,pool[o],0);
      sg.addColorStop(0,'transparent');sg.addColorStop(1,pool[o+7]>.5?'rgba(232,0,45,1)':'rgba(30,65,255,1)');
      c.strokeStyle=sg;c.globalAlpha=pool[o+5]*.6;c.lineWidth=pool[o+4]*.5;c.stroke();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'ferrari') {
    const fg=c.createRadialGradient(W*.5,H*.3,0,W*.5,H*.5,W*.75);
    fg.addColorStop(0,'rgba(220,20,0,.18)'); fg.addColorStop(.5,'rgba(140,0,0,.08)'); fg.addColorStop(1,'transparent');
    c.fillStyle=fg; c.fillRect(0,0,W,H);
    const poG=c.createLinearGradient(0,H*-.94,0,H);
    poG.addColorStop(0,'rgba(255,237,0,.18)'); poG.addColorStop(1,'rgba(255,200,0,.04)');
    c.fillStyle=poG; c.fillRect(0,H*.94,W,H*.06);
    drawF1Symbol(c,W,H,tick,'ferrari');
    for(let i=0;i<poolN;i++){
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]*2.2; pool[o+1]+=pool[o+3]*.4;
      if(pool[o]>W+20){pool[o]=-20;pool[o+1]=rnd(H);}
      const ec=c.createLinearGradient(pool[o]-pool[o+4]*22,0,pool[o],0);
      ec.addColorStop(0,'transparent');ec.addColorStop(1,'rgba(255,40,0,1)');
      c.beginPath();c.moveTo(pool[o],pool[o+1]);c.lineTo(pool[o]-pool[o+4]*22,pool[o+1]);
      c.strokeStyle=ec;c.globalAlpha=pool[o+5]*.55;c.lineWidth=pool[o+4]*.5;c.stroke();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'mercedes') {
    const mg=c.createRadialGradient(W*.5,H*.4,0,W*.5,H*.55,W*.7);
    mg.addColorStop(0,'rgba(0,210,190,.12)'); mg.addColorStop(.5,'rgba(0,100,90,.05)'); mg.addColorStop(1,'transparent');
    c.fillStyle=mg; c.fillRect(0,0,W,H);
    c.save(); c.globalAlpha=.03;
    for(let x=0;x<W;x+=22){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.strokeStyle='#c0c0c0';c.lineWidth=.8;c.stroke();}
    c.globalAlpha=1; c.restore();
    drawF1Symbol(c,W,H,tick,'mercedes');
    for(let i=0;i<poolN;i++){
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]*2.0; pool[o+1]+=pool[o+3]*.3;
      if(pool[o]>W+20){pool[o]=-20;pool[o+1]=rnd(H);}
      const mc=c.createLinearGradient(pool[o]-pool[o+4]*24,0,pool[o],0);
      mc.addColorStop(0,'transparent');mc.addColorStop(1,'rgba(0,210,190,1)');
      c.beginPath();c.moveTo(pool[o],pool[o+1]);c.lineTo(pool[o]-pool[o+4]*24,pool[o+1]);
      c.strokeStyle=mc;c.globalAlpha=pool[o+5]*.5;c.lineWidth=pool[o+4]*.5;c.stroke();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'mclaren') {
    const og=c.createRadialGradient(W*.5,H*.5,0,W*.5,H*.6,W*.7);
    og.addColorStop(0,'rgba(255,128,0,.16)'); og.addColorStop(.5,'rgba(180,80,0,.06)'); og.addColorStop(1,'transparent');
    c.fillStyle=og; c.fillRect(0,0,W,H);
    drawF1Symbol(c,W,H,tick,'mclaren');
    for(let i=0;i<poolN;i++){
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]*2.8; pool[o+1]+=pool[o+3]*.4;
      if(pool[o]>W+20){pool[o]=-20;pool[o+1]=rnd(H);}
      const oc=c.createLinearGradient(pool[o]-pool[o+4]*30,0,pool[o],0);
      oc.addColorStop(0,'transparent');oc.addColorStop(1,'rgba(255,128,0,1)');
      c.beginPath();c.moveTo(pool[o],pool[o+1]);c.lineTo(pool[o]-pool[o+4]*30,pool[o+1]);
      c.strokeStyle=oc;c.globalAlpha=pool[o+5]*.6;c.lineWidth=pool[o+4]*.5;c.stroke();
    }
    c.globalAlpha=1;
  }

  else if (bt === 'astonmartin') {
    const ag=c.createRadialGradient(W*.5,H*.4,0,W*.5,H*.55,W*.7);
    ag.addColorStop(0,'rgba(0,111,98,.14)'); ag.addColorStop(.5,'rgba(0,60,54,.06)'); ag.addColorStop(1,'transparent');
    c.fillStyle=ag; c.fillRect(0,0,W,H);
    const limeg=c.createRadialGradient(W*.5,H,0,W*.5,H,W*.5);
    limeg.addColorStop(0,'rgba(206,220,0,.06)'); limeg.addColorStop(1,'transparent');
    c.fillStyle=limeg; c.fillRect(0,0,W,H);
    drawF1Symbol(c,W,H,tick,'astonmartin');
    for(let i=0;i<poolN;i++){
      const o=i*PSTRIDE;
      pool[o]+=pool[o+2]*1.8; pool[o+1]+=pool[o+3]*.3;
      if(pool[o]>W+20){pool[o]=-20;pool[o+1]=rnd(H);}
      const ac=c.createLinearGradient(pool[o]-pool[o+4]*22,0,pool[o],0);
      ac.addColorStop(0,'transparent');ac.addColorStop(1,'rgba(0,111,98,1)');
      c.beginPath();c.moveTo(pool[o],pool[o+1]);c.lineTo(pool[o]-pool[o+4]*22,pool[o+1]);
      c.strokeStyle=ac;c.globalAlpha=pool[o+5]*.5;c.lineWidth=pool[o+4]*.5;c.stroke();
    }
    c.globalAlpha=1;
  }
}

/** @param {CanvasRenderingContext2D} c @param {number} x @param {number} y @param {number} s @param {number} rot @param {number} a @param {string} color */
function drawHex(c, x, y, s, rot, a, color) {
  c.save(); c.translate(x,y); c.rotate(rot);
  c.beginPath();
  for (let i=0;i<6;i++) {
    const ang=(i/6)*Math.PI*2;
    i ? c.lineTo(Math.cos(ang)*s, Math.sin(ang)*s) : c.moveTo(Math.cos(ang)*s, Math.sin(ang)*s);
  }
  c.closePath(); c.strokeStyle=color; c.globalAlpha=a; c.lineWidth=1; c.stroke(); c.globalAlpha=1; c.restore();
}

// ═══════════════════════════════════════════════════════════════════════
// ICONIC SYMBOLS — one function per bgType
// ═══════════════════════════════════════════════════════════════════════
/** @param {CanvasRenderingContext2D} c @param {string} btype */
function drawSymbol(c, btype) {
  const fn = SYMBOLS[btype];
  if (fn) fn(c, W, H, tick);
}

/** @type {Record<string, (c:CanvasRenderingContext2D, W:number, H:number, t:number)=>void>} */
const SYMBOLS = {
  supernatural(c,W,H,t) {
    const cx=W*.5,cy=H*.58,R=Math.min(W,H)*.16;
    const breath=.042+.014*Math.sin(t*.55),emGlow=.5+.5*Math.sin(t*.7);
    c.save(); c.translate(cx,cy);
    const halo=c.createRadialGradient(0,0,R*.7,0,0,R*1.5);
    halo.addColorStop(0,`rgba(200,60,0,${breath*.22})`); halo.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=halo; c.beginPath(); c.arc(0,0,R*1.5,0,Math.PI*2); c.fill();
    c.strokeStyle='rgba(180,40,0,1)'; c.lineWidth=1.4;
    c.globalAlpha=breath*1.1; c.beginPath(); c.arc(0,0,R,0,Math.PI*2); c.stroke();
    c.globalAlpha=breath*.75; c.lineWidth=.7; c.beginPath(); c.arc(0,0,R*.88,0,Math.PI*2); c.stroke();
    const starPts=[];
    for (let i=0;i<5;i++){const a=(i*2/5-.5)*Math.PI*2;starPts.push([Math.cos(a)*R,Math.sin(a)*R]);}
    c.beginPath(); c.globalAlpha=breath; c.strokeStyle='rgba(200,45,0,1)'; c.lineWidth=1.1;
    const order=[0,2,4,1,3,0];
    order.forEach((pi,i)=>i===0?c.moveTo(starPts[pi][0],starPts[pi][1]):c.lineTo(starPts[pi][0],starPts[pi][1]));
    c.stroke();
    c.globalAlpha=breath*.55; c.lineWidth=.6; c.beginPath(); c.arc(0,0,R*.6,0,Math.PI*2); c.stroke();
    c.beginPath(); c.arc(0,0,R*.045,0,Math.PI*2);
    c.fillStyle='rgba(255,100,20,1)'; c.globalAlpha=breath*2.2*emGlow; c.fill();
    c.globalAlpha=1; c.restore();
  },

  mentalist(c,W,H,t) {
    const cx=W*.5,cy=H*.52,R=Math.min(W,H)*.13;
    const drip=.5+.5*Math.sin(t*.38),breath=.07+.022*Math.sin(t*.5);
    c.save(); c.translate(cx,cy);
    const bg=c.createRadialGradient(0,0,0,0,0,R*1.6);
    bg.addColorStop(0,`rgba(120,0,0,${breath*.55})`); bg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=bg; c.beginPath(); c.arc(0,0,R*1.6,0,Math.PI*2); c.fill();
    c.strokeStyle='rgba(160,8,8,1)'; c.lineWidth=2.8; c.globalAlpha=breath*1.15; c.lineCap='round';
    c.beginPath();
    for (let i=0;i<=60;i++) {
      const a=(i/60)*Math.PI*2;
      const w=1+.032*Math.sin(i*3.7+t*.08)+.018*Math.cos(i*5.1);
      const px=Math.cos(a)*R*w,py=Math.sin(a)*R*w;
      i===0?c.moveTo(px,py):c.lineTo(px,py);
    }
    c.closePath(); c.stroke();
    c.beginPath(); c.arc(-R*.32,-R*.22,R*.1,0,Math.PI*2); c.fillStyle='rgba(150,5,5,1)'; c.globalAlpha=breath*1.1; c.fill();
    c.beginPath(); c.arc(R*.3,-R*.2,R*.12,0,Math.PI*2); c.fillStyle='rgba(150,5,5,1)'; c.globalAlpha=breath*1.1; c.fill();
    c.beginPath(); c.moveTo(-R*.44,R*.1); c.bezierCurveTo(-R*.44,R*.52,R*.44,R*.52,R*.44,R*.1);
    c.strokeStyle='rgba(160,8,8,1)'; c.lineWidth=2.6; c.globalAlpha=breath*1.15; c.lineCap='round'; c.stroke();
    const dripPos=[-R*.3,R*.02,R*.28];
    dripPos.forEach((dx,i)=>{
      const dLen=R*(.28+.14*Math.sin(t*.3+i*1.1))*drip;
      c.globalAlpha=breath*.85; c.strokeStyle='rgba(130,5,5,1)'; c.lineWidth=2; c.lineCap='round';
      c.beginPath(); c.moveTo(dx,R); c.quadraticCurveTo(dx+R*.04,R+dLen*.55,dx+R*.01*(i-1),R+dLen); c.stroke();
      c.beginPath(); c.ellipse(dx+R*.01*(i-1),R+dLen,R*.045,R*.07,0,0,Math.PI*2);
      c.fillStyle='rgba(110,4,4,1)'; c.globalAlpha=breath*.7*drip; c.fill();
    });
    c.globalAlpha=1; c.restore();
  },

  dark(c,W,H,t) {
    const cx=W*.5,cy=H*.56,R=Math.min(W,H)*.14;
    const spinSlow=t*.014,breath=.038+.012*Math.sin(t*.42);
    c.save(); c.translate(cx,cy); c.rotate(spinSlow);
    const bg=c.createRadialGradient(0,0,0,0,0,R*1.4);
    bg.addColorStop(0,`rgba(30,70,160,${breath*.65})`); bg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=bg; c.beginPath(); c.arc(0,0,R*1.4,0,Math.PI*2); c.fill();
    c.strokeStyle='rgba(68,136,204,1)'; c.lineWidth=1.5; c.lineCap='round';
    for (let i=0;i<3;i++) {
      const baseA=(i/3)*Math.PI*2-Math.PI/2;
      const ox=Math.cos(baseA)*R*.5,oy=Math.sin(baseA)*R*.5;
      const startA=baseA+Math.PI*.42+Math.PI/2,endA=baseA-Math.PI*.42+Math.PI/2+Math.PI*2;
      c.globalAlpha=breath*(i===0?1.4:i===1?1.15:1.0);
      c.beginPath(); c.arc(ox,oy,R,startA,endA); c.stroke();
    }
    c.globalAlpha=breath*.55; c.lineWidth=.8; c.beginPath(); c.arc(0,0,R*1.08,0,Math.PI*2); c.stroke();
    c.beginPath(); c.arc(0,0,R*.07,0,Math.PI*2);
    c.fillStyle='rgba(100,175,255,1)'; c.globalAlpha=breath*2.8*(0.6+0.4*Math.sin(t*.8)); c.fill();
    for (let i=0;i<3;i++) {
      const na=(i/3)*Math.PI*2-Math.PI/2;
      c.beginPath(); c.arc(Math.cos(na)*R*.78,Math.sin(na)*R*.78,R*.05,0,Math.PI*2);
      c.fillStyle='rgba(88,160,220,1)'; c.globalAlpha=breath*2; c.fill();
    }
    c.save(); c.rotate(-spinSlow);
    c.font=`${Math.max(8,R*.2)}px 'Josefin Sans',sans-serif`;
    c.textAlign='center'; c.textBaseline='middle'; c.fillStyle='rgba(100,170,220,1)';
    ['1953','1986','2019'].forEach((yr,i)=>{
      const ya=(i/3)*Math.PI*2-Math.PI/2+Math.PI;
      c.globalAlpha=breath*1.5; c.fillText(yr,Math.cos(ya)*R*1.35,Math.sin(ya)*R*1.35);
    });
    const msg='SIC MUNDUS CREATUS EST';
    c.font=`${Math.max(6,R*.155)}px 'Josefin Sans',sans-serif`;
    c.fillStyle='rgba(68,130,200,1)';
    for (let i=0;i<msg.length;i++) {
      const ca=-Math.PI/2+(i/msg.length)*Math.PI*2;
      c.save(); c.translate(Math.cos(ca)*R*1.55,Math.sin(ca)*R*1.55); c.rotate(ca+Math.PI/2);
      c.globalAlpha=breath*1.2; c.fillText(msg[i],0,0); c.restore();
    }
    c.restore(); c.globalAlpha=1; c.restore();
  },

  breakingbad(c,W,H,t) {
    const cx=W*.5,cy=H*.56,R=Math.min(W,H)*.1,breath=.05+.016*Math.sin(t*.55);
    c.save(); c.translate(cx,cy);
    const cellW=R*1.1,cellH=R*1.3,gap=R*.12;
    [{sym:'Br',num:'35',wt:'79.9',name:'BROMINE',x:-cellW-gap/2},{sym:'Ba',num:'56',wt:'137.3',name:'BARIUM',x:gap/2}].forEach(({sym,num,wt,name,x})=>{
      const hi=sym==='Br'?'#7ec800':'#b8f040';
      c.save(); c.translate(x+cellW/2,0);
      c.strokeStyle=hi; c.lineWidth=1.1; c.globalAlpha=breath; c.strokeRect(-cellW/2,-cellH/2,cellW,cellH);
      c.font=`${R*.22}px 'Bebas Neue',sans-serif`; c.fillStyle=hi; c.textAlign='left'; c.textBaseline='top';
      c.globalAlpha=breath*.85; c.fillText(num,-cellW/2+R*.07,-cellH/2+R*.05);
      c.textAlign='right'; c.fillText(wt,cellW/2-R*.05,-cellH/2+R*.05);
      c.font=`bold ${R*.72}px 'Bebas Neue',sans-serif`; c.textAlign='center'; c.textBaseline='middle';
      c.globalAlpha=breath*1.1*(0.85+0.15*Math.sin(t*.45)); c.fillText(sym,0,0);
      c.font=`${R*.17}px 'Bebas Neue',sans-serif`; c.textBaseline='bottom'; c.globalAlpha=breath*.65;
      c.fillText(name,0,cellH/2-R*.06); c.restore();
    });
    const totalW=(cellW*2+gap);
    for (let i=0;i<6;i++) {
      const orbitA=(i/6)*Math.PI*2+t*(i%2===0?.04:-.03);
      const orbitR=totalW*.52+R*.1;
      const sx=Math.cos(orbitA)*orbitR,sy=Math.sin(orbitA)*orbitR*.5;
      const sz=R*(.055+.022*Math.sin(t*.5+i));
      c.save(); c.translate(sx,sy); c.rotate(orbitA+t*.15);
      c.beginPath(); c.moveTo(0,-sz*2); c.lineTo(sz*.8,-sz*.2); c.lineTo(sz*.5,sz*1.2);
      c.lineTo(-sz*.5,sz*1.2); c.lineTo(-sz*.8,-sz*.2); c.closePath();
      c.fillStyle='rgba(60,140,255,1)'; c.globalAlpha=(breath*.55+.025*Math.sin(t*.8+i)); c.fill();
      c.strokeStyle='rgba(140,200,255,1)'; c.lineWidth=.5; c.globalAlpha=breath*.4; c.stroke();
      c.restore();
    }
    c.globalAlpha=1; c.restore();
  },

  strangerthings(c,W,H,t) {
    const cx=W*.5,cy=H*.55,R=Math.min(W,H)*.13;
    const openAmt=.45+.45*Math.sin(t*.38),breath=.045+.013*Math.sin(t*.65);
    c.save(); c.translate(cx,cy);
    const glow=c.createRadialGradient(0,0,R*.2,0,0,R*1.55);
    glow.addColorStop(0,`rgba(150,20,200,${breath*.4})`);
    glow.addColorStop(.5,`rgba(100,0,160,${breath*.15})`); glow.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=glow; c.beginPath(); c.arc(0,0,R*1.55,0,Math.PI*2); c.fill();
    for (let i=0;i<5;i++) {
      const pa=(i/5)*Math.PI*2-Math.PI/2,ext=openAmt*R*.58,pw=R*(.36+openAmt*.08);
      c.save(); c.rotate(pa); c.beginPath(); c.moveTo(0,R*.12);
      c.bezierCurveTo(-pw*.7,R*.18+ext*.25,-pw*.55,R*.15+ext*.8,0,R*.18+ext);
      c.bezierCurveTo(pw*.55,R*.15+ext*.8,pw*.7,R*.18+ext*.25,0,R*.12);
      c.closePath();
      const pg=c.createLinearGradient(0,R*.12,0,R*.18+ext);
      pg.addColorStop(0,`rgba(60,0,100,${breath*1.4})`);
      pg.addColorStop(.5,`rgba(140,20,200,${breath})`);
      pg.addColorStop(1,`rgba(80,5,130,${breath*.5})`);
      c.fillStyle=pg; c.fill();
      c.beginPath(); c.moveTo(0,R*.14); c.quadraticCurveTo(0,R*.14+ext*.5,0,R*.17+ext);
      c.strokeStyle='rgba(200,60,255,1)'; c.globalAlpha=breath*.7; c.lineWidth=.7; c.stroke();
      c.restore();
    }
    const mawR=R*(.12+.06*openAmt);
    c.beginPath(); c.arc(0,0,mawR,0,Math.PI*2); c.fillStyle='rgba(5,0,12,1)'; c.globalAlpha=.85; c.fill();
    const tg=c.createRadialGradient(0,0,0,0,0,mawR*.6);
    tg.addColorStop(0,`rgba(220,80,255,${breath*openAmt*.7})`); tg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=tg; c.beginPath(); c.arc(0,0,mawR*.6,0,Math.PI*2); c.fill();
    c.globalAlpha=1; c.restore();
  },

  interstellar(c,W,H,t) {
    const cx=W*.5,cy=H*.54,R=Math.min(W,H)*.15;
    const diskRot=t*.038,breath=.032+.01*Math.sin(t*.55),tilt=.22;
    c.save(); c.translate(cx,cy);
    for (let layer=3;layer>=0;layer--) {
      const lr=R*(1+layer*.18);
      c.beginPath(); c.ellipse(0,0,lr,lr*tilt,diskRot+layer*.15,0,Math.PI*2);
      c.strokeStyle='rgba(120,190,255,1)'; c.globalAlpha=breath*[.12,.085,.055,.03][layer]*20;
      c.lineWidth=layer===0?3:layer===1?1.8:1; c.stroke();
    }
    c.save(); c.beginPath(); c.ellipse(0,0,R*1.02,R*tilt,diskRot,-.8,.8);
    c.strokeStyle='rgba(210,235,255,1)'; c.globalAlpha=breath*2.8; c.lineWidth=4; c.stroke(); c.restore();
    c.beginPath(); c.arc(0,0,R*.52,0,Math.PI*2); c.fillStyle='rgba(0,0,0,1)'; c.globalAlpha=.97; c.fill();
    c.beginPath(); c.arc(0,0,R*.55,0,Math.PI*2); c.strokeStyle='rgba(140,200,255,1)'; c.globalAlpha=breath*1.8; c.lineWidth=1.4; c.stroke();
    c.save(); c.rotate(-diskRot*2);
    c.font=`${Math.max(8,R*.22)}px 'Josefin Sans',sans-serif`;
    c.fillStyle='rgba(120,180,255,1)'; c.textAlign='center'; c.textBaseline='middle';
    c.globalAlpha=breath*1.8*(0.5+0.5*Math.sin(t*.35)); c.fillText('STAY',0,R*1.58);
    c.restore(); c.globalAlpha=1; c.restore();
  },

  dune(c,W,H,t) {
    const cx=W*.5,cy=H*.55,R=Math.min(W,H)*.1;
    const breath=.04+.012*Math.sin(t*.5),spiceBlue=.4+.6*Math.abs(Math.sin(t*.18));
    c.save(); c.translate(cx,cy);
    c.strokeStyle='rgba(200,150,30,1)'; c.lineCap='round';
    for (let i=0;i<4;i++) {
      const r=R*(1.05+i*.22);
      c.beginPath(); c.arc(0,0,r,-Math.PI+i*.1+t*.01,Math.PI-i*.08+t*.01);
      c.globalAlpha=breath*(.6-i*.12); c.lineWidth=.8; c.stroke();
    }
    [-R*.5,R*.5].forEach((eyeX)=>{
      c.save(); c.translate(eyeX,0);
      c.beginPath(); c.ellipse(0,0,R*.38,R*.24,0,0,Math.PI*2);
      c.fillStyle=`rgba(${180+spiceBlue*40|0},${160+spiceBlue*60|0},${80+spiceBlue*160|0},1)`;
      c.globalAlpha=breath*1.1; c.fill();
      const irisBlue=30+spiceBlue*200|0;
      c.beginPath(); c.arc(0,0,R*.2,0,Math.PI*2);
      const iG=c.createRadialGradient(0,0,0,0,0,R*.2);
      iG.addColorStop(0,`rgba(0,20,${irisBlue},1)`);
      iG.addColorStop(.6,`rgba(0,${irisBlue*.4|0},${irisBlue},1)`);
      iG.addColorStop(1,`rgba(0,${irisBlue*.2|0},${irisBlue*.7|0},1)`);
      c.fillStyle=iG; c.globalAlpha=breath*1.2; c.fill();
      c.beginPath(); c.arc(0,0,R*.08,0,Math.PI*2); c.fillStyle='rgba(0,0,0,1)'; c.globalAlpha=breath*.9; c.fill();
      c.restore();
    });
    const msg='· THE SPICE MUST FLOW ·';
    c.font=`${Math.max(6,R*.19)}px 'Cinzel',serif`; c.fillStyle='rgba(210,160,30,1)'; c.textAlign='center'; c.textBaseline='middle';
    for (let i=0;i<msg.length;i++) {
      const ca=-Math.PI/2+(i/msg.length)*Math.PI*2;
      c.save(); c.translate(Math.cos(ca)*R*1.62,Math.sin(ca)*R*1.62); c.rotate(ca+Math.PI/2);
      c.globalAlpha=breath*1.3; c.fillText(msg[i],0,0); c.restore();
    }
    c.globalAlpha=1; c.restore();
  },

  matrix(c,W,H,t) {
    const cx=W*.5,cy=H*.64,R=Math.min(W,H)*.044;
    const float=Math.sin(t*.5)*R*.18,breath=.06+.018*Math.sin(t*.6);
    c.save(); c.translate(cx,cy+float);
    c.font=`bold ${Math.max(9,R*1.1)}px monospace`;
    c.fillStyle='rgba(0,230,0,1)'; c.textAlign='center'; c.textBaseline='bottom';
    c.globalAlpha=breath*1.2*(0.6+0.4*Math.sin(t*.4)); c.fillText('CHOOSE',0,-R*1.6);
    [[-.28,'rgba(190,15,15,1)',-2.1],[.28,'rgba(20,75,210,1)',2.1]].forEach(([rot,col,bx])=>{
      c.save(); c.rotate(rot);
      c.beginPath(); c.ellipse(bx,0,R*1.1,R*.44,0,0,Math.PI*2);
      c.fillStyle=col; c.globalAlpha=breath*1.1; c.fill();
      c.restore();
    });
    c.globalAlpha=1; c.restore();
  },

  bladerunner(c,W,H,t) {
    const cx=W*.5,cy=H*.38,R=Math.min(W,H)*.1;
    const blinkCycle=(t*.14)%Math.PI;
    const openness=Math.max(.05,Math.abs(Math.sin(blinkCycle)));
    const irisRot=t*.055,breath=.042+.012*Math.sin(t*.5);
    c.save(); c.translate(cx,cy);
    const eyeGlow=c.createRadialGradient(0,0,0,0,0,R*1.6);
    eyeGlow.addColorStop(0,`rgba(220,100,15,${breath*.25})`); eyeGlow.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=eyeGlow; c.beginPath(); c.arc(0,0,R*1.6,0,Math.PI*2); c.fill();
    const eyeW=R*1.9,eyeH=R*openness*.7+R*.03;
    c.beginPath(); c.ellipse(0,0,eyeW,eyeH,0,0,Math.PI*2);
    c.fillStyle='rgba(30,12,0,1)'; c.globalAlpha=.85; c.fill();
    c.strokeStyle='rgba(180,120,50,1)'; c.globalAlpha=breath*.9; c.lineWidth=1; c.stroke();
    c.save(); c.beginPath(); c.ellipse(0,0,eyeW,eyeH,0,0,Math.PI*2); c.clip();
    if (openness>.08) {
      const irisR=Math.min(eyeH*.92,R*.45);
      const iG=c.createRadialGradient(0,0,0,0,0,irisR);
      iG.addColorStop(0,'rgba(35,12,0,1)'); iG.addColorStop(.35,'rgba(130,75,10,1)');
      iG.addColorStop(.7,'rgba(180,105,20,1)'); iG.addColorStop(1,'rgba(160,95,15,1)');
      c.beginPath(); c.arc(0,0,irisR,0,Math.PI*2); c.fillStyle=iG; c.globalAlpha=.82; c.fill();
      c.save(); c.rotate(irisRot);
      for (let i=0;i<18;i++) {
        const fa=(i/18)*Math.PI*2;
        c.beginPath(); c.moveTo(Math.cos(fa)*irisR*.22,Math.sin(fa)*irisR*.22);
        c.lineTo(Math.cos(fa)*irisR*.94,Math.sin(fa)*irisR*.94);
        c.strokeStyle='rgba(190,120,25,1)'; c.globalAlpha=breath*.35; c.lineWidth=.5; c.stroke();
      }
      c.restore();
      c.beginPath(); c.arc(0,0,irisR*.32,0,Math.PI*2); c.fillStyle='rgba(0,0,0,1)'; c.globalAlpha=.95; c.fill();
    }
    c.restore();
    c.font=`${Math.max(7,R*.2)}px 'Teko',sans-serif`;
    c.fillStyle='rgba(220,120,40,1)'; c.textAlign='center'; c.textBaseline='top';
    c.globalAlpha=breath*.8; c.fillText('MORE HUMAN THAN HUMAN',0,R*.8);
    c.globalAlpha=1; c.restore();
  },

  inception(c,W,H,t) {
    const cx=W*.5,cy=H*.57,R=Math.min(W,H)*.1;
    const spin=t*.62,wobble=Math.sin(t*.11)*.07,breath=.042+.012*Math.sin(t*.65);
    c.save(); c.translate(cx,cy); c.rotate(wobble);
    const topW=R*.52,botW=R*.18,th=R*1.3;
    const shimmerR=120+40*Math.cos(spin)|0,shimmerB=160+40*Math.sin(spin*.7)|0;
    const bodyG=c.createLinearGradient(-topW,0,topW,0);
    bodyG.addColorStop(0,`rgba(${shimmerR},${shimmerR*.7|0},${shimmerB},.12)`);
    bodyG.addColorStop(.4,`rgba(${shimmerR+20},${shimmerR*.8|0},${shimmerB+15},${breath*1.1})`);
    bodyG.addColorStop(1,`rgba(${shimmerR},${shimmerR*.65|0},${shimmerB},.08)`);
    c.beginPath();
    c.moveTo(-topW,-th*.45); c.lineTo(topW,-th*.45); c.lineTo(botW,th*.55); c.lineTo(-botW,th*.55); c.closePath();
    c.fillStyle=bodyG; c.globalAlpha=.82; c.fill();
    c.strokeStyle='rgba(160,160,230,1)'; c.globalAlpha=breath; c.lineWidth=.9; c.stroke();
    c.font=`${Math.max(7,R*.21)}px 'Playfair Display',serif`;
    c.fillStyle='rgba(160,160,240,1)'; c.textAlign='center'; c.textBaseline='top';
    c.globalAlpha=breath*1.3*(0.5+0.5*Math.sin(t*.3)); c.fillText('STILL SPINNING…',0,R*1.48);
    c.globalAlpha=1; c.restore();
  },

  godfather(c,W,H,t) {
    const cx=W*.42,cy=H*.6,R=Math.min(W,H)*.1,bloom=.55+.4*Math.sin(t*.18),breath=.032+.01*Math.sin(t*.4);
    c.save(); c.translate(cx,cy);
    c.beginPath(); c.moveTo(0,R*.2); c.quadraticCurveTo(-R*.15,R*1.4,R*.08,R*2.8);
    c.strokeStyle='rgba(30,65,15,1)'; c.globalAlpha=breath*1.1; c.lineWidth=1.8; c.lineCap='round'; c.stroke();
    const totalPetals=14;
    for (let i=totalPetals-1;i>=0;i--) {
      const frac=i/totalPetals,a=frac*Math.PI*2*2.5+t*.035;
      const pr=R*(.04+frac*.62*bloom),ps=R*(.1+frac*.28);
      const px=Math.cos(a)*pr,py=Math.sin(a)*pr*.72;
      c.save(); c.translate(px,py); c.rotate(a+.9);
      c.beginPath(); c.ellipse(0,0,ps*.75,ps*.52,0,0,Math.PI*2);
      c.fillStyle=`rgba(${80+frac*70|0},${3+frac*6|0},8,1)`;
      c.globalAlpha=breath*(0.55+frac*.35); c.fill(); c.restore();
    }
    c.beginPath(); c.arc(0,0,R*.1,0,Math.PI*2); c.fillStyle='rgba(30,3,3,1)'; c.globalAlpha=breath*1.2; c.fill();
    c.globalAlpha=1; c.restore();
    c.save(); c.translate(W*.64,H*.6);
    c.font=`italic ${Math.max(10,R*.62)}px 'IM Fell English',serif`;
    c.fillStyle='rgba(175,140,55,1)'; c.textAlign='center'; c.textBaseline='middle';
    c.globalAlpha=breath*1.1; c.fillText('Family',0,0);
    c.font=`${Math.max(7,R*.22)}px 'IM Fell English',serif`; c.globalAlpha=breath*.62;
    c.fillText('above all else',0,R*.5); c.restore();
  }
};

// ═══════════════════════════════════════════════════════════════════════
// F1 TEAM SYMBOLS
// ═══════════════════════════════════════════════════════════════════════
/**
 * @param {CanvasRenderingContext2D} c
 * @param {number} W @param {number} H @param {number} t @param {string} teamId
 */
function drawF1Symbol(c, W, H, t, teamId) {
  const fns = {
    redbull:     drawF1_redbull,
    ferrari:     drawF1_ferrari,
    mercedes:    drawF1_mercedes,
    mclaren:     drawF1_mclaren,
    astonmartin: drawF1_astonmartin
  };
  const fn = fns[teamId];
  if (fn) fn(c, W, H, t);
}

function drawF1_redbull(c,W,H,t) {
  const cx=W*.5,cy=H*.52,R=Math.min(W,H)*.12;
  const breath=.04+.012*Math.sin(t*.6),pulse=.5+.5*Math.sin(t*.8);
  c.save(); c.translate(cx,cy);
  const bg=c.createRadialGradient(0,0,0,0,0,R*1.6);
  bg.addColorStop(0,`rgba(232,0,45,${breath*.3})`); bg.addColorStop(.5,`rgba(30,65,255,${breath*.1})`); bg.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=bg; c.beginPath(); c.arc(0,0,R*1.6,0,Math.PI*2); c.fill();
  const pw=R*.7,ph=R*.85;
  c.strokeStyle='rgba(232,0,45,1)'; c.lineWidth=1.5; c.globalAlpha=breath*1.1;
  c.strokeRect(-pw/2,-ph/2,pw,ph);
  c.font=`bold ${R*.88}px 'Orbitron',monospace`; c.textAlign='center'; c.textBaseline='middle';
  c.fillStyle='rgba(232,0,45,1)'; c.globalAlpha=breath*(0.85+0.15*Math.sin(t*.5));
  c.fillText('1',0,0);
  c.font=`${Math.max(6,R*.18)}px 'Orbitron',monospace`; c.fillStyle='rgba(255,220,220,1)';
  c.globalAlpha=breath*.7; c.fillText('VER',0,ph*.5+R*.18);
  c.strokeStyle='rgba(232,0,45,1)'; c.lineWidth=1.2; c.globalAlpha=breath*.75;
  c.beginPath(); c.moveTo(-R*.38,-ph/2-R*.05); c.quadraticCurveTo(-R*.6,-ph/2-R*.4,-R*.28,-ph/2-R*.32); c.stroke();
  c.beginPath(); c.moveTo(R*.38,-ph/2-R*.05); c.quadraticCurveTo(R*.6,-ph/2-R*.4,R*.28,-ph/2-R*.32); c.stroke();
  c.beginPath(); c.arc(pw*.6,0,R*.12,0,Math.PI*2);
  c.fillStyle='rgba(30,65,255,1)'; c.globalAlpha=breath*pulse*1.5; c.fill();
  c.globalAlpha=1; c.restore();
}

function drawF1_ferrari(c,W,H,t) {
  const cx=W*.5,cy=H*.54,R=Math.min(W,H)*.13;
  const breath=.042+.012*Math.sin(t*.5);
  c.save(); c.translate(cx,cy);
  const bg=c.createRadialGradient(0,0,0,0,0,R*1.7);
  bg.addColorStop(0,`rgba(255,40,0,${breath*.28})`); bg.addColorStop(.5,`rgba(255,200,0,${breath*.06})`); bg.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=bg; c.beginPath(); c.arc(0,0,R*1.7,0,Math.PI*2); c.fill();
  c.globalAlpha=breath*.9;
  c.strokeStyle='rgba(255,237,0,1)'; c.lineWidth=1.3;
  c.beginPath();
  c.moveTo(0,-R*.9); c.lineTo(R*.55,-R*.55); c.lineTo(R*.55,R*.35);
  c.quadraticCurveTo(0,R*1.0,-R*.55,R*.35); c.lineTo(-R*.55,-R*.55); c.closePath(); c.stroke();
  c.save(); c.translate(0,-R*.1); c.scale(R*.009,R*.009);
  c.fillStyle='rgba(255,237,0,1)'; c.globalAlpha=breath*(0.85+0.15*Math.sin(t*.4));
  c.beginPath();
  c.moveTo(0,-30); c.bezierCurveTo(10,-38,22,-32,18,-22);
  c.bezierCurveTo(28,-15,22,0,12,6); c.bezierCurveTo(18,12,16,22,10,28);
  c.lineTo(6,28); c.bezierCurveTo(10,18,8,10,0,8);
  c.bezierCurveTo(-8,10,-10,18,-6,28); c.lineTo(-10,28);
  c.bezierCurveTo(-16,22,-18,12,-12,6); c.bezierCurveTo(-22,0,-28,-15,-18,-22);
  c.bezierCurveTo(-22,-32,-10,-38,0,-30); c.closePath(); c.fill();
  c.restore();
  const msg='FORZA FERRARI';
  c.font=`${Math.max(6,R*.16)}px 'Cinzel',serif`; c.fillStyle='rgba(255,237,0,1)'; c.textAlign='center'; c.textBaseline='middle';
  for(let i=0;i<msg.length;i++){
    const ca=-Math.PI/2-.5+(i/msg.length)*Math.PI;
    c.save(); c.translate(Math.cos(ca)*R*1.35,Math.sin(ca)*R*1.35); c.rotate(ca+Math.PI/2);
    c.globalAlpha=breath*1.1; c.fillText(msg[i],0,0); c.restore();
  }
  c.globalAlpha=1; c.restore();
}

function drawF1_mercedes(c,W,H,t) {
  const cx=W*.5,cy=H*.53,R=Math.min(W,H)*.13;
  const breath=.038+.01*Math.sin(t*.5),spin=t*.02;
  c.save(); c.translate(cx,cy);
  const bg=c.createRadialGradient(0,0,0,0,0,R*1.5);
  bg.addColorStop(0,`rgba(0,210,190,${breath*.25})`); bg.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=bg; c.beginPath(); c.arc(0,0,R*1.5,0,Math.PI*2); c.fill();
  c.save(); c.rotate(spin);

// ═══════════════════════════════════════════════════════════════════════
// TIME SYNC — async, non-blocking
// ═══════════════════════════════════════════════════════════════════════
let clockOffset = 0;
let synced = false;

async function syncTime() {
  const endpoints = [
    'https://cloudflare.com/cdn-cgi/trace',
    'https://1.1.1.1/cdn-cgi/trace'
  ];
  const results = [];

  for (const url of endpoints) {
    try {
      const t0 = performance.now();
      const res = await fetch(url, { cache: 'no-store', signal: AbortSignal.timeout(3000) });
      const rtt = performance.now() - t0;
      const ds  = res.headers.get('date');
      if (ds) results.push({ offset: new Date(ds).getTime() - (Date.now() - rtt/2), rtt });
    } catch { /* silent */ }
  }

  if (!results.length) {
    try {
      const t0 = performance.now();
      const res = await fetch('https://worldtimeapi.org/api/ip', { cache: 'no-store', signal: AbortSignal.timeout(4000) });
      const rtt = performance.now() - t0;
      const d   = await res.json();
      results.push({ offset: new Date(d.datetime).getTime() - (Date.now() - rtt/2), rtt });
    } catch { /* silent */ }
  }

  if (!results.length) {
    document.getElementById('syncLabel').textContent = 'Local clock';
    document.getElementById('syncDot').style.background = '#ef4444';
    return;
  }

  results.sort((a, b) => a.rtt - b.rtt);
  clockOffset = results[0].offset;
  synced = true;
  /** @type {HTMLElement} */ (document.getElementById('syncDot')).style.background = currentTheme.accent;
  document.getElementById('syncLabel').textContent = `Synced · ±${Math.abs(Math.round(clockOffset))}ms`;
}

// ═══════════════════════════════════════════════════════════════════════
// SESSION TIMER
// ═══════════════════════════════════════════════════════════════════════
let sessionRunning = false;
let sessionStart   = 0;
let sessionElapsed = 0;

document.getElementById('btnStart').addEventListener('click', () => {
  sessionRunning = !sessionRunning;
  if (sessionRunning) {
    sessionStart = performance.now() - sessionElapsed;
    document.getElementById('btnStart').textContent = 'Pause';
  } else {
    sessionElapsed = performance.now() - sessionStart;
    document.getElementById('btnStart').textContent = 'Resume';
  }
});

document.getElementById('btnReset').addEventListener('click', () => {
  sessionRunning = false;
  sessionStart = sessionElapsed = 0;
  document.getElementById('btnStart').textContent = 'Start';
  document.getElementById('sessionTimer').textContent = '00:00:00';
});

/** @param {number} ms @returns {string} */
function fmtSession(ms) {
  const s=ms/1000|0, h=s/3600|0, m=(s%3600)/60|0, sc=s%60;
  return p2(h)+':'+p2(m)+':'+p2(sc);
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER LOOP — single rAF, delta-time capped at 50ms
// ═══════════════════════════════════════════════════════════════════════
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const GREETS = [[0,5,'🌙 Good Night'],[5,12,'☀️ Good Morning'],[12,17,'🌤️ Good Afternoon'],[17,21,'🌆 Good Evening'],[21,24,'🌙 Good Night']];

// Cached DOM refs — zero querySelector per frame
const DOM = {
  timeDis:    /** @type {HTMLElement} */ (document.getElementById('timeDis')),
  ampmDis:    /** @type {HTMLElement} */ (document.getElementById('ampmDis')),
  secMs:      /** @type {HTMLElement} */ (document.getElementById('secMs')),
  dateDis:    /** @type {HTMLElement} */ (document.getElementById('dateDis')),
  dayPct:     /** @type {HTMLElement} */ (document.getElementById('dayPct')),
  pFill:      /** @type {HTMLElement} */ (document.getElementById('progressFill')),
  sTmr:       /** @type {HTMLElement} */ (document.getElementById('sessionTimer')),
  utcPill:    /** @type {HTMLElement} */ (document.getElementById('utcPill')),
  greeting:   /** @type {HTMLElement} */ (document.getElementById('greeting')),
  quoteText:  /** @type {HTMLElement} */ (document.getElementById('quoteText')),
  syncDot:    /** @type {HTMLElement} */ (document.getElementById('syncDot')),
  syncLabel:  /** @type {HTMLElement} */ (document.getElementById('syncLabel'))
};

let lastSec  = -1;
let lastQIdx = -1;

/** @param {number} ts */
function renderFrame(ts) {
  requestAnimationFrame(renderFrame);
  const dt = Math.min((ts - lastTs) / 1000, .05);
  lastTs = ts;

  drawBg(dt);

  const now   = new Date(Date.now() + clockOffset);
  const ms    = now.getMilliseconds();
  const sec   = now.getSeconds();
  const min   = now.getMinutes();
  const hr    = now.getHours();
  const hr12  = hr % 12 || 12;
  const ampm  = hr >= 12 ? 'PM' : 'AM';

  DOM.timeDis.textContent = p2(hr12)+':'+p2(min)+':'+p2(sec);
  DOM.ampmDis.textContent = ampm;
  DOM.secMs.textContent   = '.'+p3(ms);

  const dp = ((hr*3600+min*60+sec)*1000+ms) / 864e5 * 100;
  DOM.pFill.style.width = dp.toFixed(4)+'%';

  if (sessionRunning) DOM.sTmr.textContent = fmtSession(performance.now()-sessionStart);

  if (sec !== lastSec) {
    lastSec = sec;
    const uh=now.getUTCHours(), um=now.getUTCMinutes(), us=now.getUTCSeconds();
    DOM.utcPill.textContent = 'UTC '+p2(uh)+':'+p2(um)+':'+p2(us);
    DOM.dateDis.textContent = DAYS[now.getDay()]+', '+MONTHS[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
    const g = GREETS.find(x => hr >= x[0] && hr < x[1]);
    if (g) DOM.greeting.textContent = g[2];
    DOM.dayPct.textContent = dp.toFixed(1)+'%';
    const qs = currentTheme.quotes || NAT_QUOTES;
    const qi = ((hr*60+min)/5|0) % qs.length;
    if (qi !== lastQIdx) {
      lastQIdx = qi;
      DOM.quoteText.style.opacity = '0';
      setTimeout(() => { DOM.quoteText.textContent = '"'+qs[qi]+'"'; DOM.quoteText.style.opacity = '.38'; }, 400);
    }
  }
}
