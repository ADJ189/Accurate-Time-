<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Session Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Comfortaa:wght@300;400;700&family=Josefin+Sans:wght@100;300;400;600&family=Fraunces:ital,wght@0,100;0,700;1,400&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Special+Elite&family=Nunito:wght@300;400;600;700;800&family=IM+Fell+English:ital@0;1&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="overlay"></div>
<div id="vignette"></div>
<div id="hdrBloom"></div>
<div id="scanlines"></div>
<div id="grain"></div>
<div id="letterboxTop"></div>
<div id="letterboxBot"></div>
<canvas id="transCanvas"></canvas>

<div id="showBadge"></div>
<div class="utc-pill" id="utcPill">UTC --:--:--</div>

<div class="main">
  <div class="greeting" id="greeting">Good morning</div>
  <div>
    <div class="clock-wrap">
      <div class="time-display" id="timeDis">--<span class="colon">:</span>--<span class="colon">:</span>--</div>
      <div class="ampm" id="ampmDis">--</div>
    </div>
    <div class="seconds-ms" id="secMs">.---</div>
  </div>
  <div class="date-display" id="dateDis">—</div>
  <div class="progress-wrap">
    <div class="progress-labels"><span>Day Progress</span><span id="dayPct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="session-area">
    <div class="session-label">Session Timer</div>
    <div class="session-timer" id="sessionTimer">00:00:00</div>
    <div class="session-controls">
      <button class="btn" id="btnStart">Start</button>
      <button class="btn" id="btnReset">Reset</button>
    </div>
  </div>
  <div class="sync-pill">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Syncing…</span>
  </div>
  <div class="quote-area"><div class="quote-text" id="quoteText"></div></div>
</div>

<div id="themePanel"></div>

<!-- JS modules — order matters: data → utils → canvas → renderers → sync → clock → theme → transitions → panel → init -->
<script src="js/themes.js"></script>
<script src="js/utils.js"></script>
<script src="js/canvas.js"></script>
<script src="js/renderer.js"></script>
<script src="js/symbols.js"></script>
<script src="js/f1symbols.js"></script>
<script src="js/sync.js"></script>
<script src="js/session.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/transitions.js"></script>
<script src="js/panel.js"></script>
<script src="js/main.js"></script>

</body>
</html>
